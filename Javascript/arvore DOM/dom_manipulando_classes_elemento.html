<!DOCTYPE html>
<html lang="Pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <style>

        *{
            margin: 0px;
            padding: 0px;
        }

        .estilo1{
            background: #FF0000;
            color: white;
        }

        .estilo2{
            background: black;
            color: white;
            width: 100%;
            height: 50px;
            text-align: center;
            font-size: 25px;
            padding: 25px;
        }
    </style>

    <script>

    function modificaClasse() {
        document.getElementById('mensagem').className = 'estilo2'        
    }

    </script>

</head>
<body>

    <div id="mensagem" class="estilo1">Modificando a classe do elemento</div>

    <hr>

    <button type="button" onclick="modificaClasse()">Aplicar classes</button>
        
</body>
</html>
