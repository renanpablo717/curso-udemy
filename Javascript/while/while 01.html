<!DOCTYPE html>
<html lang="Pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>

    <script>

        var x = 1

        document.write('Início <br/>')

        //true
        while(x <= 10){
            document.write(x + '<br/>')

            x++

            if(x >= 11){
                break
            }

        }

        document.write('Fim <br/>')

    </script>


</head>

</body>
</html>
