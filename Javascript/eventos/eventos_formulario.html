<body>
    <!--onfocus: acionado quando o elemento recebe o foco do cursor do mouse

        onblur: acionado quando o elemento perde o foco, quando apertamos o "TAB"m ou clico em outro elemento

        onchange: acionado quando o estado do elemento é modificado , comum em elementos select quando modificamos a opção
        -->

        <input onfocus="console.log('ganhou o foco')" onblur="console.log('perdeu o foco')" type="text">

        <select onchange="console.log('Estado foi modificada')">
            <option>---Selecione---</option>
            <option value="1">Primeira opção</option>
            <option value="2">Segunda opção</option>
        </select>
    
    
</body>
