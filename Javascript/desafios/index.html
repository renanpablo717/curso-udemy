<!doctype html>

<html lang="Pt-Br">

  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="estilo.css">
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/203aa36ad5.js" crossorigin="anonymous"></script>

    <title>Alistamento Militar</title>

    <script>

      var data = new Date()
      var ano = data.getFullYear()

      function Verificar(){
        var anoNasc = document.getElementById('nascimento').value
        var idade = ano - anoNasc
        if(idade < 18){
          alert('Você ainda não tem idade para se alistar')
        } else if(idade == 18){
          alert('Está na hora de se alistar')
        } else {
          alert('Você já passou da idade de se alistar')
        }
      }
    </script>

  </head>

  <body>

    <div id="navegacao">

      <nav>

        <header>
          <h1>Alistamento Militar</h1>
        </header>

        <ul class="nav nav-tabs justify-content-end">

        <li class="nav-item">
            <a href="#" class="nav-link active">Home</a>
        </li>
        <li class="nav-item">
            <a href="#" class="nav-link">Sobre</a>
        </li>
        <li class="nav-item">
            <a href="#" class="nav-link">Serviços</a>
        </li>

      </ul>
        

      </nav>

    </div>

    <main>

      <div class="dialog mt-4">
        <h2>Bem-vindo ao Alistamento Militar</h2>
        <p>Verique se você está apto para o alistamento militar ou se precisa se regularizar.</p>
        <input type="text" id="nascimento" placeholder="Digite o ano do seu nascimento">
        <button onclick="Verificar()" class="btn btn-light mb-2">Verificar</button>
      </div>

    </main>


  <body>
