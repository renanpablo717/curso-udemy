    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 8</title>

    <script>

    var x = parseInt(prompt('Digite um valor'))

    document.write('<hr/>')

    var c = 0

    while(c <=10){
        document.write(x + ' x ' + c + ' = ' + (c * x) + '<br/>')
        c++


    }

    document.write('<hr/>')

    </script>
