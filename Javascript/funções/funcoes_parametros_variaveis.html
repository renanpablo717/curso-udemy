<!DOCTYPE html>
<html lang="Pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>

    <script>

        /*Arguments é um objeto
        É através dele que conseguimos trabalhar com os parâmetros variáveis, ele exise no escopo de cada uma das funções em JS*/

        function soma(){
            var resultado = 0
            for(var i in arguments){
                resultado += arguments[i]
            }

            return resultado

        }

        

        console.log(soma(7, 5, 3.2, 'texto'))


    </script>


</head>
